<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Water Leakage Detection Inference</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <!-- ONNX Runtime Web CDN -->
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
</head>
<body>

  <!-- Main Application Header -->
  <header class="app-header">
    <div class="header-container">
      <h1>Water Leakage Detection System</h1>
      <p>GRU Autoencoder Inference Portal</p>
    </div>
  </header>

  <!-- Main Content Area -->
  <main class="app-main">
    <div class="content-container">
      
      <!-- Input Section -->
      <section class="card input-section">
        <h2>Enter SCADA Data</h2>
        <p>Please enter a comma-separated list of exactly 40 numerical features. The last feature must be the `Is_Nighttime` flag (0 or 1).</p>
        
        <form id="inference-form">
          <div class="form-group">
            <textarea id="features-input" rows="6" placeholder="e.g., 28.20, 33.25, 36.63, ... (40 values)"></textarea>
            <span id="input-feedback" class="feedback-msg"></span>
          </div>
          
          <div class="form-actions">
            <button type="submit" id="btn-predict" class="btn btn-primary">Detect Leakage</button>
            <button type="button" id="btn-load-normal" class="btn btn-secondary">Load Normal Sample</button>
            <button type="button" id="btn-load-leak" class="btn btn-danger">Load Leak Sample</button>
          </div>
        </form>
      </section>

      <!-- Results Section -->
      <section class="card results-section hidden" id="results-card">
        <h2>Inference Result</h2>
        <div class="result-box" id="result-box">
          <div class="result-row">
            <span class="result-label">Status:</span>
            <span class="result-value" id="res-status">--</span>
          </div>
          <div class="result-row">
            <span class="result-label">System Error (MSE):</span>
            <span class="result-value" id="res-mse">--</span>
          </div>
          <div class="result-row">
            <span class="result-label">Allowed Limit (Threshold):</span>
            <span class="result-value" id="res-threshold">--</span>
          </div>
        </div>
      </section>

    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
